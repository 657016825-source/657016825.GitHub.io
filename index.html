function score(s){

    let sc = 0;

    // 基础

    sc += (s.change - 3) * 10;

    sc += s.volume_ratio * 5;

    // 换手最佳

    sc += (10 - Math.abs(s.turnover - 8));

    // 龙头加分

    if(s.leader) sc += 20;

    // 收盘强度

    if(s.close_strength > 0.95) sc += 15;

    // 尾盘资金

    if(s.end_flow) sc += 15;

    return sc;

}
