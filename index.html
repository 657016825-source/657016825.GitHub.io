<!DOCTYPE html>

<html>

<head>

<meta charset="utf-8">

<title>一夜持股自动版</title>

<style>

body { background:#111; color:#fff; font-family:Arial; padding:10px;}

h2 { color:#0f0;}

.stock { padding:10px; border-bottom:1px solid #333;}

</style>

</head>

<body>

<h2>🔥 一夜持股自动选股</h2>

<button onclick="run()">获取今日股票</button>

<div id="result">（点击按钮加载）</div>

<script>

async function run(){

    let res = await fetch("data.json");

    let data = await res.json();

    let html = "";

    data.forEach(s=>{

        html += `

        <div class="stock">

        🔥 ${s.名称}<br>

        涨幅:${s.change}% | 换手:${s.turnover}% | 量比:${s.volume}

        </div>`;

    });

    if(data.length==0){

        html="今天不适合做（空仓）";

    }

    document.getElementById("result").innerHTML=html;

}

</script>

</body>

</html>
