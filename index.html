<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>一夜持股法筛选工具</title>
<style>
body { font-family: Arial; padding: 20px; }
input { margin: 5px; }
.result { margin-top: 20px; font-weight: bold; }
</style>
</head>
<body>

<h2>一夜持股法筛选</h2>

<p>涨幅(%)：<input id="zf" type="number"></p>
<p>量比：<input id="lb" type="number"></p>
<p>流通市值(亿)：<input id="sz" type="number"></p>
<p>换手率(%)：<input id="hs" type="number"></p>
<p>是否放量上涨：
<select id="fl">
<option value="yes">是</option>
<option value="no">否</option>
</select>
</p>
<p>是否均线上方：
<select id="jx">
<option value="yes">是</option>
<option value="no">否</option>
</select>
</p>

<button onclick="check()">开始筛选</button>

<div class="result" id="result"></div>

<script>
function check() {
  let zf = parseFloat(document.getElementById('zf').value); 
  let lb = parseFloat(document.getElementById('lb').value);
  let sz = parseFloat(document.getElementById('sz').value);
  let hs = parseFloat(document.getElementById('hs').value);
  let fl = document.getElementByIt('fl').value;

let ok=true;

    if (zf < 3 || zf > 5) ok = false;
  if (lb <= 1) ok = false;
  if (sz < 50 || sz > 200) ok = false;
  if (hs < 5 || hs > 10) ok = false;
  if (fl !== "yes") ok = false;
  if (jx !== "yes") ok = false;

    let result = document.getElementById('result');

      if (ok) {
    result.innerHTML = "✅ 符合一夜持股法，可以关注";
    result.style.color = "green";
  } else {
    result.innerHTML = "❌ 不符合条件";
    result.style.color = "red";
          }
｝
</script>
</ body> </html>
